name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  desktop-linux:
    name: Desktop — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install NativePHP
        run: php artisan native:install --no-interaction

      - name: Build NativePHP desktop
        run: php artisan native:build linux --no-interaction

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobibot-linux
          path: "nativephp/electron/dist/*.{AppImage,deb}"

  desktop-macos:
    name: Desktop — macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install NativePHP
        run: php artisan native:install --no-interaction

      - name: Build NativePHP desktop
        run: php artisan native:build mac --no-interaction

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobibot-macos
          path: "nativephp/electron/dist/*.dmg"

  desktop-windows:
    name: Desktop — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install NativePHP
        run: php artisan native:install --no-interaction

      - name: Build NativePHP desktop
        run: php artisan native:build win --no-interaction

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobibot-windows
          path: "nativephp/electron/dist/*.exe"

  mobile-android:
    name: Mobile — Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Swap desktop for mobile (NativePHP conflict workaround)
        run: |
          composer remove nativephp/desktop --no-interaction --no-update
          composer require nativephp/mobile --no-interaction --no-update
          composer update --no-interaction --prefer-dist

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "NATIVEPHP_APP_ID=ai.jobibot.community" >> .env
          echo "NATIVEPHP_APP_VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')" >> .env
          echo "NATIVEPHP_APP_VERSION_CODE=1" >> .env

      - name: Install NativePHP Mobile
        run: php artisan native:install --force --no-interaction

      - name: Fix Android placeholders
        run: |
          GRADLE_FILE="nativephp/android/app/build.gradle.kts"
          sed -i 's/REPLACE_COMPILE_SDK/34/g' "$GRADLE_FILE"
          sed -i 's/REPLACE_MIN_SDK/24/g' "$GRADLE_FILE"
          sed -i 's/REPLACE_TARGET_SDK/34/g' "$GRADLE_FILE"
          sed -i 's/REPLACE_APP_ID/ai.jobibot.community/g' "$GRADLE_FILE"
          sed -i 's/REPLACEMECODE/1/g' "$GRADLE_FILE"
          sed -i 's/REPLACEME/1.0.0/g' "$GRADLE_FILE"
          sed -i 's/REPLACE_MINIFY_ENABLED/false/g' "$GRADLE_FILE"
          sed -i 's/REPLACE_SHRINK_RESOURCES/false/g' "$GRADLE_FILE"
          sed -i 's/REPLACE_DEBUG_SYMBOLS/none/g' "$GRADLE_FILE"
          # Fix sdk.dir
          echo "sdk.dir=$ANDROID_SDK_ROOT" > nativephp/android/local.properties
          # Fix launcher label
          MANIFEST="nativephp/android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="NativePHP"/android:label="JobiBot"/g' "$MANIFEST"
          echo "Placeholders replaced"

      - name: Bundle Laravel app into Android assets
        run: |
          ASSETS_DIR="nativephp/android/app/src/main/assets"
          BUNDLE_ZIP="${ASSETS_DIR}/laravel_bundle.zip"
          STAGING="nativephp/android/laravel_staging"
          mkdir -p "${ASSETS_DIR}" "${STAGING}"

          # Copy app source (excluding build artefacts and android project)
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='nativephp' \
            --exclude='*.zip' \
            --exclude='*.jks' \
            . "${STAGING}/"

          # Install production Composer deps inside staging
          composer install --no-dev --no-interaction --prefer-dist \
            --optimize-autoloader --no-scripts \
            --working-dir="${STAGING}"
          composer dump-autoload --optimize --classmap-authoritative --no-scripts \
            --working-dir="${STAGING}"

          # Copy bootstrap artisan.php entry-point
          cp vendor/nativephp/mobile/bootstrap/android/artisan.php "${STAGING}/artisan.php"

          # Copy .env
          cp .env "${STAGING}/.env"

          # Ensure writable dirs
          mkdir -p "${STAGING}/bootstrap/cache"
          mkdir -p "${STAGING}/storage/framework/cache"
          mkdir -p "${STAGING}/storage/framework/sessions"
          mkdir -p "${STAGING}/storage/framework/views"

          # Remove dev-only caches
          rm -f "${STAGING}/bootstrap/cache/packages.php"
          rm -f "${STAGING}/bootstrap/cache/services.php"

          # Create bundle zip
          BUNDLE_ZIP_ABS="${GITHUB_WORKSPACE}/${BUNDLE_ZIP}"
          cd "${STAGING}" && zip -r "${BUNDLE_ZIP_ABS}" . && cd -

          echo "Bundle size: $(du -sh ${BUNDLE_ZIP_ABS} | cut -f1)"
          ls -lh "${BUNDLE_ZIP_ABS}"

      - name: Build Android APK
        run: |
          cd nativephp/android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find nativephp/android/app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobibot-android
          path: ${{ steps.find_apk.outputs.apk_path }}

  release:
    name: Create Release
    needs: [desktop-linux, desktop-macos, desktop-windows, mobile-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --oneline --no-decorate > CHANGELOG.md
          else
            git log --oneline --no-decorate ${PREV_TAG}..HEAD > CHANGELOG.md
          fi
          {
            echo 'changelog<<EOF'
            cat CHANGELOG.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "jobibot-*"
          path: "dist/"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Display artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JobiBot Community ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## JobiBot Community Edition ${{ github.ref_name }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Downloads
            Desktop builds for Linux, macOS, Windows + Android APK.
          files: "dist/**/*.{AppImage,dmg,exe,deb,apk}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}