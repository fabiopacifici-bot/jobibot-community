name: Build Native Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  desktop:
    name: Desktop — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            build-os: linux
            artifact-name: jobibot-linux
            asset-name: JobiBot-Community-linux
          - os: macos-latest
            build-os: mac
            artifact-name: jobibot-macos
            asset-name: JobiBot-Community-macos
          - os: windows-latest
            build-os: win
            artifact-name: jobibot-windows
            asset-name: JobiBot-Community-windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install NativePHP
        run: php artisan native:install --no-interaction

      - name: Build NativePHP desktop
        run: php artisan native:build ${{ matrix.build-os }} --no-interaction

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/*