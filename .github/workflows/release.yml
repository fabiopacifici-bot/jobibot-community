name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --oneline --no-decorate > CHANGELOG.md
          else
            git log --oneline --no-decorate ${PREV_TAG}..HEAD > CHANGELOG.md
          fi
          {
            echo 'changelog<<EOF'
            cat CHANGELOG.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Display downloaded artifacts
        run: ls -R dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JobiBot Community ${{ github.ref_name }}"
          body: |
            ## JobiBot Community Edition ${{ github.ref_name }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Downloads
            See attached artifacts for desktop builds (Linux .AppImage, macOS .dmg, Windows .exe).
          files: dist/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}